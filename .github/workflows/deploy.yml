name: Skinalytics Docker Build & Push

on:
  push:
    branches:
      - main # Jab bhi tum main branch par code push karoge, ye khud chal jayega

jobs:
  build_and_publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/skinalytics-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/skinalytics-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/skinalytics-backend:buildcache,mode=max
